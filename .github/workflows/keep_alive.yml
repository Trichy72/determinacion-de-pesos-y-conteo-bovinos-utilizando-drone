name: Keep Streamlit warm + precompute dashboard

on:
  schedule:
    # Cada 5 min en horario laboral AR (7:00-22:00 = 10:00-01:00 UTC)
    - cron: '*/5 10-23 * * *'
    - cron: '*/5 0-1 * * *'
  workflow_dispatch:

concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  precompute-and-ping:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Precomputar bloque de logística del dashboard
        # Corre el cálculo pesado (loop cliente × lote × día) y guarda
        # el resultado como blob JSON en la tabla dashboard_cache.
        # La app lo lee con 1 query (~200ms) en lugar de recalcularlo
        # con 30-60s de queries a Supabase cada vez que Mauri abre la
        # app en el campo.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Sin las claves de SMTP/Twilio/etc este script no manda
          # nada — solo hace queries + INSERT. Se pasan igual por si
          # alguna dependencia importada las lee al init.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WEATHERAPI_KEY: ${{ secrets.WEATHERAPI_KEY }}
        run: python scripts/precompute_dashboard.py

      - name: Ping app (mantener Streamlit despierta)
        run: |
          set -e
          URL="https://determinacion-de-pesos-y-conteo-bovinos-utilizando-drone-9s6v3.streamlit.app/"
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 60 "$URL")
          echo "HTTP $CODE - $(date -u)"
          # Streamlit devuelve 200 si está viva, 303 si redirige a wake-up
          if [ "$CODE" = "200" ] || [ "$CODE" = "303" ]; then
            exit 0
          fi
          # Retry una vez si falla — puede que estuviera dormida
          sleep 10
          CODE2=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 90 "$URL")
          echo "Retry HTTP $CODE2"
          [ "$CODE2" = "200" ] || [ "$CODE2" = "303" ]
